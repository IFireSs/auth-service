spring:
  docker:
    compose:
      enabled: false

app:
  rate-limit:
    login:
      account-key-secret: test-rate-limit-account-key-secret-0123456789
      ip:
        capacity: 5
        refill-period: PT10M
      account:
        capacity: 100
        refill-period: PT15M
      account-ip:
        capacity: 5
        refill-period: PT10M

  security:
    access-token:
      issuer: auth-service-test
      audience: auth-service-api-test
      ttl: PT10M
      validation-mode: stateful

    cookies:
      secure: false
      same-site: "Lax"

    refresh:
      revoke-detect: true
      ttl: P14D
      reuse-grace: PT3S
      client-binding:
        require-session-id: true
        bind-to-user-agent: true
        bind-to-ip: false

      cleanup:
        enabled: false
        retention: P7D
        cron: "0 0 4 * * *"
