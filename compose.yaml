services:
  auth-service:
    build: .
    container_name: auth-service
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://auth-postgres:5432/authdb
      DB_USERNAME: bm
      DB_PASSWORD: bm
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_EVENTS_KAFKA_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_RATE_LIMIT_BACKEND: "redis"
      APP_RATE_LIMIT_REDIS_HEALTH_ENABLED: "true"
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      auth-postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  auth-postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=authdb'
      - 'POSTGRES_PASSWORD=bm'
      - 'POSTGRES_USER=bm'
    ports:
      - "5432:5432"
    volumes:
      - ./pg-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bm -d authdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  redis:
    image: redis:7.4-alpine
    container_name: auth-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
